name: web checks

on:
  pull_request:
    paths:
      - "web/**"
      - "bench/pyproject.toml"
      - "bench/uv.lock"
      - "bench/src/bench_harness/site_data.py"
      - "bench/tests/test_site_data.py"
      - ".github/workflows/web-checks.yml"
      - ".github/workflows/deploy.yml"
  push:
    branches: [main]
    paths:
      - "web/**"
      - "bench/pyproject.toml"
      - "bench/uv.lock"
      - "bench/src/bench_harness/site_data.py"
      - "bench/tests/test_site_data.py"
      - ".github/workflows/web-checks.yml"
      - ".github/workflows/deploy.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Test web UI and configuration
        working-directory: web
        run: pnpm test

      - name: Test Worker asset responses
        working-directory: web
        run: pnpm test:worker

      - name: Install pinned headless Chromium
        working-directory: web
        run: pnpm exec playwright install --with-deps --only-shell chromium

      - name: Test thumbnail inventory and rendering
        working-directory: web
        run: pnpm test:thumbnails

      - name: Type-check and build web assets
        working-directory: web
        run: pnpm exec tsc -p tsconfig.json && pnpm exec vite build

      - name: Bundle Worker without deploying
        working-directory: web
        run: pnpm exec wrangler deploy --dry-run --outdir "$RUNNER_TEMP/wrangler-dry-run"

  site-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: bench/uv.lock

      - name: Test optional thumbnail manifest contract
        run: uv run --frozen --project bench pytest bench/tests/test_site_data.py
