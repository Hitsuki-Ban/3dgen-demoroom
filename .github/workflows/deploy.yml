# サイトを Cloudflare Workers Static Assets へデプロイする。
# ベンチ成果物(GLB/meta)は git に無いので、R2 の site-data/ プレフィックスから同期する
# (ローカル→R2 へのアップロードは bench-harness upload-s3 で行う)。
name: deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: bench/uv.lock

      - uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: web/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: web
        run: pnpm install --frozen-lockfile

      - name: Web tests
        working-directory: web
        run: pnpm test

      - name: Audit published thumbnail freshness
        working-directory: web
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: >-
          pnpm thumbnail:check -- s3://3dgen-runs/site-data
          --expected-failure partcrafter/chrome-espresso-machine
          --backend gpu
          --report ../outputs/thumbnail-check-report.json

      - name: Sync benchmark results from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          mkdir -p outputs/site-data
          aws s3 sync "s3://3dgen-runs/site-data/" outputs/site-data/ --endpoint-url "${{ secrets.R2_ENDPOINT }}" --only-show-errors
          meta_count=$(find outputs/site-data -mindepth 3 -maxdepth 3 -name meta.json | wc -l)
          glb_count=$(find outputs/site-data -mindepth 3 -maxdepth 3 -name output.glb | wc -l)
          thumb_count=$(find outputs/site-data -mindepth 3 -maxdepth 3 -name thumb.webp | wc -l)
          failure_count=$(find outputs/site-data -mindepth 3 -maxdepth 3 -name failure.json | wc -l)
          echo "synced top-level meta.json: ${meta_count}"
          echo "synced top-level output.glb: ${glb_count}"
          echo "synced top-level thumb.webp: ${thumb_count}"
          echo "synced top-level failure.json: ${failure_count}"

      - name: Validate complete site-data snapshot
        run: >-
          uv run --frozen --project bench bench-harness site-data-snapshot
          outputs/site-data
          tasks/tasks.json
          web/src/data/model-registry.json
          web/public/manifest.json
          --expected-failure partcrafter/chrome-espresso-machine

      - name: Test Worker asset responses
        working-directory: web
        run: pnpm test:worker

      - name: Build
        working-directory: web
        run: pnpm build

      - name: Deploy to Cloudflare Workers
        working-directory: web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm exec wrangler deploy
